<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Big Bang Game - Người chơi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f0c29 50%, #03001e 100%);
            overflow-x: hidden;
        }
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        input, .option-btn, .option-choice {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        
        /* Hiệu ứng kính mờ cao cấp */
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Thanh thời gian với hiệu ứng chuyển màu và chạy mượt */
        .timer-bar { 
            transition: width 0.2s linear; 
            box-shadow: 0 0 12px var(--tw-shadow-color, rgba(34, 197, 94, 0.5));
        }
        
        /* Trạng thái nút bị khóa */
        .disabled-btn { 
            opacity: 0.5; 
            cursor: not-allowed; 
            pointer-events: none; 
        }

        /* Nút lựa chọn câu hỏi đáp án */
        .option-btn { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .option-btn:hover:not(.disabled-btn) { 
            transform: translateY(-2px); 
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.4);
            border-color: rgba(129, 140, 248, 0.8);
            background: rgba(99, 102, 241, 0.15);
        }
        .option-btn:active:not(.disabled-btn) {
            transform: scale(0.98);
        }

        /* Highlights trạng thái trả lời */
        .correct-highlight { 
            background: rgba(16, 185, 129, 0.2) !important; 
            border-color: #10b981 !important; 
            color: #34d399 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        .wrong-highlight { 
            background: rgba(239, 68, 68, 0.2) !important; 
            border-color: #ef4444 !important; 
            color: #f87171 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
        .selected-temp { 
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%) !important; 
            border-color: #6366f1 !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* Thiết kế Modal */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(3, 0, 30, 0.85); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: rgba(15, 23, 42, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem; 
            width: 90%; 
            max-width: 450px; 
            padding: 2.5rem 2rem; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); 
            animation: showModal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes showModal { 
            from { transform: scale(0.9) translateY(20px); opacity: 0; } 
            to { transform: scale(1) translateY(0); opacity: 1; } 
        }

        /* Fullscreen Popup Cấp Độ */
        .fullscreen-popup { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, rgba(30,27,75,1) 0%, rgba(15,23,42,1) 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            animation: fadeIn 0.4s ease-out; 
        }
        .fullscreen-popup-content { 
            text-align: center; 
            color: white; 
            animation: popupBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .fullscreen-popup-icon { 
            font-size: 5.5rem; 
            margin-bottom: 1.5rem; 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }
        .fullscreen-popup-title { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin-bottom: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            background: linear-gradient(to right, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .fullscreen-popup-subtitle { 
            font-size: 1.25rem; 
            opacity: 0.85; 
            letter-spacing: 1px;
        }

        /* Popup Giải Thích */
        .explain-popup { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(15, 23, 42, 0.98); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem; 
            max-width: 90%; 
            width: 500px; 
            padding: 2.25rem; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            z-index: 10001; 
            animation: popupBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ease-out; 
        }
        .explain-popup-title { 
            font-size: 1.5rem; 
            font-weight: 800; 
            margin-bottom: 1rem; 
            color: #a5b4fc; 
            letter-spacing: 2px;
        }
        .explain-popup-content { 
            font-size: 1rem; 
            color: #e2e8f0; 
            line-height: 1.6; 
            margin-bottom: 1.75rem; 
            text-align: left; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popupBounce { 
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; } 
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
        }

        /* CSS Tuỳ chọn hướng dẫn */
        .option-choice { 
            padding: 0.875rem 1rem; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.875rem; 
            margin-bottom: 0.625rem; 
            cursor: pointer; 
            transition: all 0.25s; 
            text-align: left; 
            color: #e2e8f0;
        }
        .option-choice:hover { 
            background-color: rgba(99, 102, 241, 0.15); 
            border-color: #6366f1; 
        }
        .option-selected { 
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); 
            border-color: #818cf8; 
            color: white; 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        /* Toast cảnh báo lỗi */
        .warning-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10002;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
            animation: fadeOut 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translate(-50%, -10px); }
        }

        /* Thêm các hiệu ứng mây sao nền mượt mà */
        .glow-sphere {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
        }

        /* Tùy chỉnh thanh cuộn đẹp mắt */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center relative" oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <!-- Ánh sáng nền huyền ảo -->
    <div class="glow-sphere top-10 left-10"></div>
    <div class="glow-sphere bottom-10 right-10" style="background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="w-full max-w-2xl mx-auto z-10">
        <div class="glass-panel rounded-3xl p-6 sm:p-8 shadow-2xl relative overflow-hidden">
            <!-- Khung phản sáng phong cách viễn tưởng -->
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent"></div>
            
            <!-- LOGIN PANEL -->
            <div id="loginPanel" class="py-4">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-4 shadow-inner">
                        <span class="text-4xl">🌌</span>
                    </div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">HITLER MINI GAME</h1>
                    <p class="text-sm text-indigo-200/60">Hành trình khám phá KKK</p>
                </div>
                
                <h2 class="text-lg font-semibold text-indigo-200 mb-3 text-center">📝 Nhập tên của bạn để tham gia</h2>
                <input type="text" id="playerName" placeholder="Tên hiển thị của bạn..." 
                       class="w-full p-4 bg-slate-900/50 border border-slate-700/50 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 rounded-2xl mb-4 text-center text-white placeholder-slate-500 font-medium transition-all outline-none" autocomplete="off">
                <button id="loginBtn" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white py-4 rounded-2xl font-bold tracking-wider shadow-lg shadow-indigo-600/30 active:scale-[0.99] transition-all">
                    🎮 VÀO CHƠI NGAY
                </button>
            </div>

            <!-- GAME PANEL -->
            <div id="gamePanel" class="hidden space-y-6">
                <!-- Thông tin người chơi -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex items-center space-x-3 bg-slate-900/40 border border-slate-800/80 rounded-2xl p-3.5">
                        <div class="text-2xl">👤</div>
                        <div class="truncate">
                            <p class="text-[10px] text-slate-400 font-bold tracking-wider uppercase">NGƯỜI CHƠI</p>
                            <span id="playerNameDisplay" class="font-extrabold text-white text-sm"></span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 bg-slate-900/40 border border-slate-800/80 rounded-2xl p-3.5">
                        <div class="text-2xl">⭐</div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold tracking-wider uppercase">TỔNG ĐIỂM</p>
                            <span id="playerScore" class="font-black text-indigo-400 text-lg">0</span>
                        </div>
                    </div>
                </div>

                <!-- Đồng hồ đếm ngược -->
                <div class="bg-slate-900/30 border border-slate-800/60 rounded-2xl p-4">
                    <div class="flex justify-between items-center text-sm mb-2.5">
                        <span class="text-slate-300 font-medium flex items-center gap-1.5">⏱️ Thời gian còn lại</span>
                        <span id="timerText" class="font-bold text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 px-2.5 py-0.5 rounded-full text-xs">-- giây</span>
                    </div>
                    <div class="w-full bg-slate-950/60 rounded-full h-3.5 p-[2px] border border-slate-800/60 overflow-hidden">

                </div>

                <!-- Tiêu đề câu hỏi & Điểm số câu -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <div class="bg-gradient-to-r from-indigo-500/10 to-violet-500/10 border border-indigo-500/20 text-indigo-300 rounded-full px-4 py-1.5 text-xs font-bold tracking-wider uppercase" id="levelBadge">
                            ---
                        </div>
                        <div class="text-xs font-bold text-slate-400 tracking-wider">
                            TRỊ GIÁ: <span id="questionPoints" class="text-sm font-black text-violet-400 bg-violet-500/10 border border-violet-500/20 px-2 py-0.5 rounded-md ml-1">0</span> ĐIỂM
                        </div>
                    </div>
                    
                    <!-- Khung câu hỏi -->
                    <div id="questionText" class="text-base sm:text-lg font-bold p-5 bg-gradient-to-b from-slate-900/50 to-slate-900/80 border border-slate-800 rounded-2xl text-slate-100 shadow-inner min-h-[90px] flex items-center leading-relaxed">

                <!-- Các phương án trả lời -->
                <div id="options" class="grid grid-cols-1 gap-3"></div>

                <!-- Bảng xếp hạng -->

                        <span>🏆</span> BẢNG XẾP HẠNG THỜI GIAN THỰC

                    <div id="rankList" class="space-y-2 max-h-52 overflow-y-auto pr-1"></div>
                </div>
            </div>

    <!-- Firebase SDK Map -->
    <script type="importmap">{ "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js" } }</script>

    <!-- Kịch bản Javascript chính (Giữ nguyên toàn bộ logic nghiệp vụ) -->
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, set, onValue } from "firebase/database";

        // ==================== CHỐNG MỞ TAB MỚI + HỦY CÂU HỎI (CHỈ KHI ĐANG TRẢ LỜI CÂU HỎI) ====================
        (function() {
            let hasTriggeredCancel = false;
            let isGameActive = false; // Chỉ bật khi đã login và đang trong câu hỏi
            
            function showToast(msg) {
                let toast = document.querySelector('.warning-toast');
                if (toast) toast.remove();
                toast = document.createElement('div');
                toast.className = 'warning-toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            function showCancelQuestionModal() {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="text-6xl mb-4">⚠️</div>
                        <h2 class="text-2xl font-bold mb-2 text-red-500 tracking-wide">CÂU HỎI BỊ HỦY</h2>
                        <p class="text-slate-300 mb-6 text-sm leading-relaxed">Bạn đã rời khỏi game hoặc chuyển tab khi câu hỏi đang diễn ra.<br><span class="text-red-400 font-semibold">Câu hỏi này sẽ không được tính điểm.</span></p>
                        <button id="closeCancelModal" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3.5 rounded-xl font-bold hover:from-indigo-500 hover:to-indigo-600 transition shadow-lg shadow-indigo-900/30">Đã hiểu</button>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('closeCancelModal').onclick = () => modal.remove();
            }

            // Các phím tắt mở tab mới (luôn chặn kể cả khi chưa login)
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && e.key === 'u') ||
                    (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    window.location.href = 'about:blank';
                    setTimeout(() => { window.close(); }, 100);
                }
                if (e.ctrlKey && (e.key === 't' || e.key === 'T' || e.key === 'n' || e.key === 'N')) {
                    e.preventDefault();
                    showToast("⚠️ Không thể mở tab/cửa sổ mới!");
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && (e.key === 'n' || e.key === 'N')) {
                    e.preventDefault();
                    showToast("⚠️ Không thể mở cửa sổ ẩn danh!");
                    return false;
                }
            });
            
            document.addEventListener('mousedown', function(e) {
                if (e.button === 1) {
                    e.preventDefault();
                    showToast("⚠️ Không thể mở tab mới bằng chuột giữa!");
                    return false;
                }
            });
            
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Phát hiện DevTools
            let devtoolsDetected = false;
            function detectDevTools() {
                const element = new Image();
                Object.defineProperty(element, 'id', {
                    get: function() {
                        devtoolsDetected = true;
                        throw new Error('DevTools detected');
                    }
                });
                console.log(element);
            }
            setInterval(() => {
                if (devtoolsDetected) {
                    window.location.href = 'about:blank';
                    setTimeout(() => { window.close(); }, 100);
                }
                devtoolsDetected = false;
                detectDevTools();
            }, 1000);
            
            // CHỈ KHI GAME ĐANG HOẠT ĐỘNG (đã login và có câu hỏi) mới hủy câu hỏi khi rời tab
            document.addEventListener('visibilitychange', function() {
                if (!isGameActive) return;
                if (document.hidden) {
                    showToast("⚠️ Bạn đã rời khỏi game!");
                    if (window.cancelCurrentQuestion && !hasTriggeredCancel) {
                        hasTriggeredCancel = true;
                        window.cancelCurrentQuestion();
                        showCancelQuestionModal();
                    }
                }
            });
            
            window.addEventListener('blur', function() {
                if (!isGameActive) return;
                if (!hasTriggeredCancel) {
                    showToast("⚠️ Bạn đã rời khỏi game!");
                    if (window.cancelCurrentQuestion) {
                        hasTriggeredCancel = true;
                        window.cancelCurrentQuestion();
                        showCancelQuestionModal();
                    }
                }
            });
            
            window.addEventListener('focus', function() {
                hasTriggeredCancel = false;
            });
            
            // Export để set trạng thái game active
            window.setGameActive = function(active) {
                isGameActive = active;
                if (!active) {
                    hasTriggeredCancel = false; // reset khi thoát game
                }
            };
        })();

        const firebaseConfig = {
            apiKey: "AIzaSyALdVA3woqhtG1k7tfApCiP5ar8kH1JfHI",
            authDomain: "administrator-a7ed3.firebaseapp.com",
            databaseURL: "https://administrator-a7ed3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "administrator-a7ed3",
            storageBucket: "administrator-a7ed3.firebasestorage.app",
            messagingSenderId: "299780527549",
            appId: "1:299780527549:web:21d540316de77159692ed4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentPlayer = null, currentQuestion = null, hasAnsweredCurrent = false, selectedAnswerIdx = -1, isLocked = false, resultData = null, currentQuestionIndex = -1, modalShownForCurrentQuestion = false;
        let timerEndTime = null, timerDuration = 30, timerInterval = null;
        let hasShownTutorial = false;
        let isQuestionCancelled = false;

        // Hàm hủy câu hỏi hiện tại (gọi từ bên ngoài)
        window.cancelCurrentQuestion = async function() {
            if (!currentQuestion || isQuestionCancelled) return;
            isQuestionCancelled = true;
            
            if (timerInterval) clearInterval(timerInterval);
            timerEndTime = null;
            isLocked = true;
            
            const qIndex = currentQuestion.index;
            await set(ref(db, `players/${currentPlayer.name}/cancelled/${qIndex}`), true);
            
            document.getElementById('questionText').innerHTML = "<div class='text-center w-full'><span class='text-red-400 text-lg block mb-1'>⚠️ CÂU HỎI ĐÃ BỊ HỦY ⚠️</span><span class='text-xs text-slate-400 font-normal'>Bạn đã rời khỏi game khi đang diễn ra câu hỏi này. Hệ thống không tính điểm cho bạn ở câu này.</span></div>";
            document.getElementById('options').innerHTML = '';
            
            await set(ref(db, `game/cancelledBy/${currentPlayer.name}`), { questionIndex: qIndex, timestamp: Date.now() });
        };

        function updateTimerDisplay() {
            if (isQuestionCancelled) return;
            if (!timerEndTime || timerEndTime <= Date.now()) {
                document.getElementById('timerText').innerHTML = 'Hết giờ';
                document.getElementById('timerBar').style.width = '0%';
                document.getElementById('timerBar').style.setProperty('--tw-shadow-color', 'rgba(239, 68, 68, 0.5)');
                document.getElementById('timerBar').className = 'timer-bar bg-red-500 h-2.5 rounded-full';
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                return;
            }
            const remaining = Math.max(0, (timerEndTime - Date.now()) / 1000);
            const percent = (remaining / timerDuration) * 100;
            document.getElementById('timerText').innerHTML = `${Math.ceil(remaining)} giây`;
            document.getElementById('timerBar').style.width = `${Math.max(0, percent)}%`;
            const bar = document.getElementById('timerBar');
            if (percent < 20) {
                bar.className = 'timer-bar bg-red-500 h-2.5 rounded-full';
                bar.style.setProperty('--tw-shadow-color', 'rgba(239, 68, 68, 0.6)');
            } else if (percent < 50) {
                bar.className = 'timer-bar bg-amber-500 h-2.5 rounded-full';
                bar.style.setProperty('--tw-shadow-color', 'rgba(245, 158, 11, 0.6)');
            } else {
                bar.className = 'timer-bar bg-emerald-500 h-2.5 rounded-full';
                bar.style.setProperty('--tw-shadow-color', 'rgba(16, 185, 129, 0.6)');
            }
        }

        function startTimerLocal(seconds) { if (timerInterval) clearInterval(timerInterval); timerDuration = seconds; timerEndTime = Date.now() + seconds * 1000; updateTimerDisplay(); timerInterval = setInterval(() => { if (!timerEndTime || timerEndTime <= Date.now()) { if (timerInterval) clearInterval(timerInterval); timerInterval = null; updateTimerDisplay(); } else { updateTimerDisplay(); } }, 200); }
        function stopTimerLocal() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } timerEndTime = null; updateTimerDisplay(); }

        function showFullscreenPopup(level) {
            const popup = document.createElement('div'); popup.className = 'fullscreen-popup';
            let icon='',title='',subtitle='';
            if(level==='Easy'){icon='🍃';title='CẤP ĐỘ DỄ';subtitle='Mỗi câu đúng được 1 điểm';}
            else if(level==='Medium'){icon='🌿';title='CẤP ĐỘ TRUNG BÌNH';subtitle='Mỗi câu đúng được 2 điểm';}
            else if(level==='Hard'){icon='⚡';title='CẤP ĐỘ KHÓ';subtitle='Mỗi câu đúng được 3 điểm';}
            else if(level==='BOSS'){icon='👑🔥';title='CẤP ĐỘ BOSS';subtitle='Mỗi câu đúng được 6 điểm';}
            popup.innerHTML=`<div class="fullscreen-popup-content"><div class="fullscreen-popup-icon">${icon}</div><div class="fullscreen-popup-title">${title}</div><div class="fullscreen-popup-subtitle">${subtitle}</div></div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 2000);
        }

        function showExplanationPopup(explanation) {
            const popup = document.createElement('div'); popup.className = 'explain-popup';
            popup.innerHTML = `<div class="explain-popup-title">📚 GIẢI THÍCH CHUYÊN SÂU</div><div class="explain-popup-content">${explanation}</div><button id="closeExplainBtn" class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold py-2.5 px-8 rounded-xl transition shadow-lg shadow-indigo-900/40">Đóng</button>`;
            document.body.appendChild(popup);
            document.getElementById('closeExplainBtn').onclick = () => popup.remove();
        }

        function showTutorialModal() {
            if (hasShownTutorial) return;
            hasShownTutorial = true;
            
            const modal1 = document.createElement('div');
            modal1.className = 'modal-overlay';
            modal1.innerHTML = `
                <div class="modal-content !max-w-[480px]">
                    <div class="text-5xl mb-3">🎓</div>
                    <h2 class="text-2xl font-extrabold mb-2 text-white tracking-wide">HƯỚNG DẪN CHƠI</h2>
                    <p class="text-slate-400 mb-5 text-sm">Hãy thử trả lời câu hỏi ví dụ bên dưới để làm quen nhé!</p>
                    <div class="bg-slate-900/80 border border-slate-800 p-4 rounded-2xl text-left mb-5">
                        <p class="font-bold mb-4 text-white text-sm leading-relaxed">📖 Câu hỏi mẫu: Trong truyện tranh Doraemon, nhân vật Nobita thường nhờ ai giúp đỡ khi gặp khó khăn?</p>
                        <div id="tutorialOptions" class="space-y-2">
                            <div class="option-choice" data-opt="0"><span class="font-bold text-indigo-400 mr-2">A.</span> Doraemon</div>
                            <div class="option-choice" data-opt="1"><span class="font-bold text-indigo-400 mr-2">B.</span> Jaian</div>
                            <div class="option-choice" data-opt="2"><span class="font-bold text-indigo-400 mr-2">C.</span> Shizuka</div>
                            <div class="option-choice" data-opt="3"><span class="font-bold text-indigo-400 mr-2">D.</span> Dekisugi</div>
                        </div>
                    </div>
                    <button id="tutorialNextBtn" class="w-full bg-slate-800 text-slate-500 py-3.5 rounded-xl font-bold tracking-wide transition-all" disabled>📢 XEM GIẢI THÍCH</button>
                </div>
            `;
            document.body.appendChild(modal1);
            
            let selectedOpt = null;
            const options = modal1.querySelectorAll('.option-choice');
            const nextBtn = modal1.querySelector('#tutorialNextBtn');
            
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    options.forEach(o => o.classList.remove('option-selected'));
                    opt.classList.add('option-selected');
                    selectedOpt = opt.dataset.opt;
                    nextBtn.disabled = false;
                    nextBtn.classList.remove('bg-slate-800', 'text-slate-500');
                    nextBtn.classList.add('bg-gradient-to-r', 'from-indigo-600', 'to-violet-600', 'text-white', 'hover:from-indigo-500', 'hover:to-violet-500', 'shadow-lg', 'shadow-indigo-900/30');
                });
            });
            
            nextBtn.onclick = () => {
                if (!selectedOpt) return;
                modal1.remove();
                
                const modal2 = document.createElement('div');
                modal2.className = 'modal-overlay';
                const isCorrect = (selectedOpt === '0');
                modal2.innerHTML = `
                    <div class="modal-content">
                        <div class="text-5xl mb-3">${isCorrect ? '🎉' : '📚'}</div>
                        <h2 class="text-2xl font-extrabold mb-2 text-white tracking-wide">${isCorrect ? 'CHÍNH XÁC!' : 'GIẢI THÍCH'}</h2>
                        <div class="bg-slate-900/80 border ${isCorrect ? 'border-emerald-500/30' : 'border-indigo-500/30'} p-4 rounded-xl mb-6 text-left">
                            <p class="text-sm leading-relaxed text-slate-200">
                                ${isCorrect ? 
                                    '✅ <span class="text-emerald-400 font-semibold">Bạn đã trả lời đúng!</span> Doraemon chính là chú mèo máy thân thiết luôn giúp đỡ Nobita bằng những bảo bối kỳ diệu từ tương lai.' : 
                                    '❌ <span class="text-red-400 font-semibold">Rất tiếc chưa chính xác!</span> Đáp án đúng là A (Doraemon). Doraemon là chú mèo máy đến từ tương lai, luôn giúp đỡ Nobita bằng những bảo bối thần kỳ.'
                                }
                            </p>
                        </div>
                        <button id="finishTutorialBtn" class="w-full bg-gradient-to-r from-emerald-600 to-green-600 text-white py-3.5 rounded-xl font-bold tracking-wider hover:from-emerald-500 hover:to-green-500 shadow-lg shadow-emerald-900/30 transition">🎮 VÀO GAME THÔI!</button>
                    </div>
                `;
                document.body.appendChild(modal2);
                document.getElementById('finishTutorialBtn').onclick = () => modal2.remove();
            };
        }

        async function login() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return alert("Vui lòng nhập tên của bạn!");
            const playerRef = ref(db, `players/${name}`);
            const snap = await get(playerRef);
            if (!snap.exists()) await set(playerRef, { name, score: 0, answers: {} });
            const data = snap.exists() ? snap.val() : { name, score: 0, answers: {} };
            currentPlayer = { name, score: data.score || 0, answers: data.answers || {} };
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            document.getElementById('playerNameDisplay').innerText = name;
            document.getElementById('playerScore').innerText = currentPlayer.score;
            showTutorialModal();
        }

        function resetForNewQuestion() { 
            hasAnsweredCurrent=false; selectedAnswerIdx=-1; isLocked=false; resultData=null; modalShownForCurrentQuestion=false; isQuestionCancelled=false;
            const oldModal=document.querySelector('.modal-overlay'); 
            if(oldModal && !oldModal.querySelector('#finishTutorialBtn')) oldModal.remove(); 
        }

        function showResultModal(isCorrect, correctLetter, correctText, pointsEarned, playerScore, explanation) {
            if(modalShownForCurrentQuestion) return;
            modalShownForCurrentQuestion=true;
            const modal=document.createElement('div'); modal.className='modal-overlay';
            modal.innerHTML=`
                <div class="modal-content">
                    <div class="text-6xl mb-4">${isCorrect?'🎉':'😢'}</div>
                    <h2 class="text-2xl font-extrabold mb-1 tracking-wide text-white">${isCorrect?'CHÍNH XÁC!':'CHƯA CHÍNH XÁC!'}</h2>
                    <p class="text-sm text-slate-300 mb-5 leading-relaxed">${isCorrect?`Chúc mừng! Bạn đã trả lời đúng và tích lũy được <span class="text-emerald-400 font-bold">+${pointsEarned} điểm</span>.`:`Đáp án chính xác là <span class="text-indigo-400 font-bold">${correctLetter}</span>. <span class="text-slate-300 block mt-1 italic">"${correctText}"</span>`}</p>
                    <div class="bg-slate-900/60 border border-slate-800 p-4 rounded-2xl mb-6">
                        <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">TỔNG ĐIỂM CỦA BẠN</p>
                        <p class="text-4xl font-black text-indigo-400">${playerScore}</p>
                    </div>
                    <div class="flex space-x-3">
                        <button id="showExplainBtn" class="flex-1 bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-300 border border-indigo-500/30 font-bold py-3 px-4 rounded-xl transition">📚 Giải thích</button>
                        <button id="closeModalBtn" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-4 rounded-xl transition">Đóng</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn').onclick = () => modal.remove();
            document.getElementById('showExplainBtn').onclick = () => { showExplanationPopup(explanation); };
        }

        function displayQuestion(q) {
            if(!currentPlayer) return;
            if (isQuestionCancelled) return;
            // BẬT CHẾ ĐỘ THEO DÕI RỜI TAB
            window.setGameActive(true);
            
            currentQuestion=q; currentQuestionIndex=q.index;
            const alreadyAnswered = currentPlayer.answers && currentPlayer.answers[currentQuestionIndex] !== undefined;
            if(alreadyAnswered){ hasAnsweredCurrent=true; selectedAnswerIdx=currentPlayer.answers[currentQuestionIndex]; }
            else{ if(currentQuestionIndex!==-1){ hasAnsweredCurrent=false; selectedAnswerIdx=-1; } }
            document.getElementById('questionText').innerHTML=q.text;
            let levelText=q.level==='Easy'?'🍃 Dễ (1đ)':(q.level==='Medium'?'🌿 TBình (2đ)':(q.level==='Hard'?'⚡ Khó (3đ)':'👑 BOSS (6đ)'));
            document.getElementById('levelBadge').innerHTML=levelText;
            document.getElementById('questionPoints').innerText=q.points;
            const optionsDiv=document.getElementById('options'); optionsDiv.innerHTML='';
            const showResult=(isLocked&&resultData&&resultData.questionIndex===currentQuestionIndex);
            const correctIdx=showResult?resultData.correctAnswer:-1;
            q.options.forEach((opt,idx)=>{
                const btn=document.createElement('button');
                let btnClass=`option-btn w-full p-3.5 rounded-xl text-left border-2 transition-all bg-slate-900/35 border-slate-800/80 text-slate-200 text-sm flex items-start gap-3 `;
                if(showResult){ btn.disabled=true; btnClass+=`disabled-btn `; if(idx===correctIdx) btnClass+=`correct-highlight `; if(selectedAnswerIdx===idx&&idx!==correctIdx) btnClass+=`wrong-highlight `; }
                else if(hasAnsweredCurrent){ btn.disabled=true; btnClass+=`disabled-btn `; if(selectedAnswerIdx===idx) btnClass+=`selected-temp `; }
                else { btn.onclick=()=>submitAnswer(idx); }
                btn.className=btnClass; 
                btn.innerHTML=`<span class="font-extrabold text-indigo-400">${String.fromCharCode(65+idx)}.</span> <span class="flex-1">${opt}</span>`;
                optionsDiv.appendChild(btn);
            });
        }

        async function submitAnswer(answerIdx){
            if(!currentPlayer||hasAnsweredCurrent||isLocked||!currentQuestion||isQuestionCancelled){ if(isLocked) alert("Câu hỏi đã bị khóa!"); return; }
            if(timerEndTime && Date.now()>timerEndTime){ alert("⏰ Đã hết thời gian trả lời!"); return; }
            const qIndex=currentQuestion.index;
            await set(ref(db,`players/${currentPlayer.name}/answers/${qIndex}`),answerIdx);
            currentPlayer.answers[qIndex]=answerIdx;
            hasAnsweredCurrent=true; selectedAnswerIdx=answerIdx;
            alert("✅ Đã ghi nhận câu trả lời. Vui lòng chờ quản trò công bố kết quả!");
            displayQuestion(currentQuestion);
        }

        function listenForLockAndResult(){
            onValue(ref(db,'game/locked'),(snapshot)=>{ isLocked=snapshot.val()===true; if(currentQuestion) displayQuestion(currentQuestion); });
            onValue(ref(db,'game/resultPublished'),async(snapshot)=>{
                const newResult=snapshot.val();
                if(!newResult){ resultData=null; if(currentQuestion) displayQuestion(currentQuestion); return; }
                resultData=newResult;
                if(currentQuestion && resultData.questionIndex===currentQuestionIndex){
                    const playerRef=ref(db,`players/${currentPlayer.name}`);
                    const snap=await get(playerRef);
                    if(snap.exists()){ currentPlayer.score=snap.val().score||0; document.getElementById('playerScore').innerText=currentPlayer.score; }
                    const isCorrect=(selectedAnswerIdx===resultData.correctAnswer);
                    const correctLetter=String.fromCharCode(65+resultData.correctAnswer);
                    const correctText=currentQuestion.options[resultData.correctAnswer];
                    showResultModal(isCorrect,correctLetter,correctText,resultData.points,currentPlayer.score, resultData.explanation);
                    displayQuestion(currentQuestion);
                }
            });
        }

        function listenForLevelPopup(){ onValue(ref(db,'game/levelPopup'),(snapshot)=>{ const data=snapshot.val(); if(data&&data.show) showFullscreenPopup(data.level); }); }
        
        function listenRanking(){
            onValue(ref(db,'players'),()=>{
                get(ref(db,'players')).then(snap=>{
                    const data=snap.val()||{};
                    const players=Object.values(data).sort((a,b)=>(b.score||0)-(a.score||0));
                    const rankDiv=document.getElementById('rankList');
                    if(players.length===0){ rankDiv.innerHTML='<div class="text-center text-slate-500 py-4 text-xs">Chưa có người chơi nào tham gia</div>'; return; }
                    rankDiv.innerHTML=players.map((p,i)=>{
                        let rankIcon = `${i+1}.`;
                        let rankBg = 'bg-slate-900/30 border border-slate-800/50';
                        if (i === 0) { rankIcon = '🥇'; rankBg = 'bg-amber-500/10 border border-amber-500/30 text-amber-300'; }
                        else if (i === 1) { rankIcon = '🥈'; rankBg = 'bg-slate-300/10 border border-slate-300/30 text-slate-300'; }
                        else if (i === 2) { rankIcon = '🥉'; rankBg = 'bg-orange-500/10 border border-orange-500/30 text-orange-400'; }
                        return `<div class="flex justify-between items-center p-3 ${rankBg} rounded-xl text-xs sm:text-sm font-semibold transition-all">
                            <span class="flex items-center gap-2"><span class="w-6 text-center">${rankIcon}</span> <span class="text-slate-100 font-bold truncate max-w-[150px]">${p.name}</span></span>
                            <span class="font-extrabold text-indigo-400 flex items-center gap-1">⭐ ${p.score||0}</span>
                        </div>`;
                    }).join('');
                });
            });
        }

        onValue(ref(db,'game/timer'),(snapshot)=>{
            const data=snapshot.val();
            if(data && data.endTime && data.endTime>0){
                const remaining = Math.max(0, (data.endTime - Date.now()) / 1000);
                if(remaining>0){ startTimerLocal(remaining); }
                else { stopTimerLocal(); }
            } else { stopTimerLocal(); }
        });

        onValue(ref(db,'game/currentQuestion'),(snap)=>{
            const q=snap.val();
            if(q && q.index!==undefined && q.index>=0 && currentPlayer){ resetForNewQuestion(); displayQuestion(q); }
            else if(q && q.finished){ 
                document.getElementById('questionText').innerHTML="<div class='text-center w-full py-4'><div class='text-4xl mb-2'>🏆</div><div class='text-indigo-300 font-extrabold text-lg'>GAME OVER!</div><div class='text-xs text-slate-400 font-normal mt-1'>Cảm ơn bạn đã tham gia cuộc chiến vũ trụ đầy thử thách này!</div></div>"; 
                document.getElementById('options').innerHTML=''; 
                document.getElementById('levelBadge').innerHTML='---'; 
                document.getElementById('questionPoints').innerText='0';
                window.setGameActive(false); // TẮT THEO DÕI KHI GAME KẾT THÚC
            }
        });

        listenForLockAndResult(); listenForLevelPopup(); listenRanking();
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('playerName').addEventListener('keypress', e => e.key === 'Enter' && login());
    </script>
</body>
</html>
